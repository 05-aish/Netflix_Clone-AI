name: Deploy Check

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/netflix_clone/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Check backend syntax
        working-directory: backend
        run: |
          node --check server.js
          node --check routes/watchHistory.route.js

      - name: Install frontend dependencies
        working-directory: frontend/netflix_clone
        run: npm ci

      - name: Build frontend
        working-directory: frontend/netflix_clone
        run: npm run build
